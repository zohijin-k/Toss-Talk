<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>TossTalk</title>


    <!-- 기본 CSS -->
    <link rel="stylesheet" href="src/style.css">
    <!-- 모바일 CSS (미디어 쿼리를 사용하여 390px 이하에서만 로드) -->
  <link rel="stylesheet" href="src/style.mobile.css" media="(max-width: 768px)">
</head>

<body>

<!-- ================= 공통 헤더 ================= -->
<header>💬 Toss-Talk 🗑️</header>

<!-- ================= 공통 네비게이션 ================= -->
<nav class="nav">
  <button id="homeBtn">🤖 상담하기</button>
  <button id="gardenBtn">🍅 텃밭 가꾸기</button>
  <button id="eggbreakBtn">🍳 계란깨기</button>
</nav>

<!-- 유저 정보 -->
  <div class="user-info"> 
    <img id="userPhoto" src="" alt="profile">
    <span id="userName"></span>
    <button id="logoutBtn">로그아웃</button> 
  </div>

<!-- ================= 정원 가꾸기 화면 ================= -->
<div id="gardenScreen" class="garden-page" style="display:none;">

  <!-- 정원 배경 박스 : 네비게이션 바로 밑에 위치 -->
  <div id="gardenContainer" class="garden-box">
    <!-- 상태창: 상단 중앙 -->
    <div id="harvestCountStatus" class="status-bar">수확한 채소: 0</div>
  </div>

  <!-- 하단 중앙 버튼 -->
  <div class="garden-controls">
    <button id="plantButton" class="garden-btn">씨앗 심기 🪴</button>
    <button id="waterButton" class="garden-btn" disabled>물 주기 💧</button>
  </div>
  <p id="plantStatus">
    <span class="status-text">씨앗을 심어 텃밭을 만들어봐요 ! 🍅</span>
</p>

</div>

  <!-- ================= 로그인 화면 ================= -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">
    <h1>TossTalk</h1>
    <p class="subtitle">마음을 가볍게, 속마음을 털어놓는 곳</p>
    <button id="googleLoginBtn" class="google-btn">Google 로그인</button>
  </div>
</div>

<!-- ================= 상담 메인 화면 ================= -->
<div id="mainScreen" style="display:none;">

  <!-- 상담 전 기분 모달 -->
  <div id="moodModal" class="modal">
    <div class="modal-content">
      <h3>현재 기분을 선택해주세요</h3>
      <div class="mood-options">
        <button class="mood-btn">🤬</button>
        <button class="mood-btn">😡</button>
        <button class="mood-btn">😠</button>
        <button class="mood-btn">🥲</button>
        <button class="mood-btn">😢</button>
        <button class="mood-btn">😭</button>
      </div>
    </div>
  </div>

  <!-- 상담 후 해소 기분 모달 -->
  <div id="resolvedMoodModal" class="modal">
    <div class="modal-content">
      <h3>해소된 기분을 선택해주세요</h3>
      <div class="mood-options">
        <button class="resolved-btn" data-emoji="☺️">☺️</button>
        <button class="resolved-btn" data-emoji="😌">😌</button>
        <button class="resolved-btn" data-emoji="🙃">🙃</button>
        <button class="resolved-btn" data-emoji="❌">❌</button>
      </div>
    </div>
  </div>

  <!-- 채팅창 -->
  <div id="chat"></div>

  <!-- 고민 해소 버튼 -->
  <button id="resolve-btn">고민이 해소되었습니까?</button>

  <!-- 쓰레기통 -->
  <div id="trash-container">
    <span id="trash">🗑️</span>
  </div>

  <!-- 입력창 + 전송 버튼 -->
  <div class="input-container">
    <textarea id="input" placeholder="Toss-Talk의 대화는 서버에 저장되지 않습니다."></textarea>
    <button class="send-btn" id="sendBtn">전송</button>
  </div>
</div>


<!----------------------- 계란깨기 ------------------------>
<div id="eggbreakScreen" class="garden-page" style="display:none;">

    <div id="eggContainer" class="egg-box"> 
        
        <div id="game-container" style="display: none;">
            
            <div id="selection-screen">
                <div class="selection-top-section">
                    
                    <div class="selection-group">
                        <div id="egg-selection">
                            <button id="prev-egg" class="nav-btn">◀️</button>
                            <img id="egg-display" src="./images/egg1.png" alt="계란" class="selectable-item selected">
                            <button id="next-egg" class="nav-btn">▶️</button>
                        </div>
                    </div>
                    
                    <div class="selection-group">
                        <div id="tool-selection">
                            <button id="prev-tool" class="nav-btn">◀️</button>
                            <img id="tool-display" src="./images/hammer.png" alt="망치" class="selectable-item">
                            <button id="next-tool" class="nav-btn">▶️</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="game-screen" style="display: none;">
                <div id="counter">카운트: <span>0</span></div>
                
                <div id="egg-container">
                    <img id="egg-image" src="" alt="계란">
                    <img id="tool-image" src="" alt="도구" class="tool-animation">
                </div>
            </div>
            </div>
        </div>
    <div id="egg-control">
        <div id="egg-status"></div>
        <button id="start-game-btn" disabled>게임 시작</button>
    </div>

    <!-- 🔊 효과음 오디오 태그 (계란깨기 전용) -->
     <audio id="eggSound_1" src="./sounds/egg_crack1.mp3" preload="auto"></audio>
     <audio id="eggSound_2" src="./sounds/egg_crack2.mp3" preload="auto"></audio>
     <audio id="explodeSound" src="./sounds/explode.mp3" preload="auto"></audio>
</div>
    </div>

<!-- ================= JS 연결 ================= -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
